<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>パスワード再設定 | Tenforge</title>
    <link rel="stylesheet" href="./static/css/style.css">
  </head>
  <body>
    <main>
      <section class="auth-card">
        <h1>パスワード再設定</h1>
        <form id="reset-form">
          <label>
            メールアドレス
            <input id="email" type="email" autocomplete="email" required>
          </label>
          <button type="submit">再設定メールを送信</button>
        </form>
        <p id="message" class="message" aria-live="polite"></p>
        <nav class="links" aria-label="認証リンク">
          <a href="./index.html">ログインへ戻る</a>
        </nav>
      </section>
    </main>
    <script>
      window.__SUPABASE_URL__ = '';
      window.__SUPABASE_ANON_KEY__ = '';
    </script>
    <script type="module">
      import { supabase } from './static/js/supabase-client.js';

      const form = document.getElementById('reset-form');
      const emailInput = document.getElementById('email');
      const message = document.getElementById('message');

      const showMessage = (text, type = '') => {
        message.textContent = text;
        message.className = `message ${type}`.trim();
      };

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        showMessage('');

        const { error } = await supabase.auth.resetPasswordForEmail(emailInput.value, {
          redirectTo: 'https://auth.tenforge.dev/callback.html',
        });

        if (error) {
          showMessage('再設定メールの送信に失敗しました。メールアドレスを確認してください。', 'error');
          return;
        }

        form.reset();
        showMessage('パスワード再設定メールを送信しました。受信箱を確認してください。', 'success');
      });
    </script>
  </body>
</html>
