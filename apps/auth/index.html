<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン | Tenforge</title>
    <link rel="stylesheet" href="./static/css/style.css">
  </head>
  <body>
    <main>
      <section class="auth-card">
        <h1>ログイン</h1>
        <form id="login-form">
          <label>
            メールアドレス
            <input id="email" type="email" autocomplete="email" required>
          </label>
          <label>
            パスワード
            <input id="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">ログイン</button>
        </form>
        <div class="actions">
          <button id="magic-link-button" type="button" class="secondary">Magic Link でログイン</button>
          <button id="google-button" type="button" class="secondary">Google でログイン</button>
        </div>
        <p id="message" class="message" aria-live="polite"></p>
        <nav class="links" aria-label="認証リンク">
          <a href="./signup.html">アカウント作成</a>
          <a href="./reset.html">パスワードを忘れた</a>
        </nav>
      </section>
    </main>
    <script>
      window.__SUPABASE_URL__ = '';
      window.__SUPABASE_ANON_KEY__ = '';
    </script>
    <script type="module">
      import { supabase } from './static/js/supabase-client.js';

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const magicLinkButton = document.getElementById('magic-link-button');
      const googleButton = document.getElementById('google-button');
      const message = document.getElementById('message');
      const params = new URLSearchParams(window.location.search);
      const returnTo = params.get('returnTo') || 'https://tenforge.dev';

      const showMessage = (text, type = '') => {
        message.textContent = text;
        message.className = `message ${type}`.trim();
      };

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        showMessage('');

        const { error } = await supabase.auth.signInWithPassword({
          email: emailInput.value,
          password: passwordInput.value,
        });

        if (error) {
          showMessage('ログインに失敗しました。メールアドレスとパスワードを確認してください。', 'error');
          return;
        }

        window.location.href = returnTo;
      });

      magicLinkButton.addEventListener('click', async () => {
        showMessage('');

        if (!emailInput.value) {
          showMessage('メールアドレスを入力してください。', 'error');
          return;
        }

        const { error } = await supabase.auth.signInWithOtp({
          email: emailInput.value,
          options: {
            emailRedirectTo: 'https://auth.tenforge.dev/callback.html',
          },
        });

        if (error) {
          showMessage('Magic Link の送信に失敗しました。時間をおいて再度お試しください。', 'error');
          return;
        }

        showMessage('ログイン用のメールを送信しました。受信箱を確認してください。', 'success');
      });

      googleButton.addEventListener('click', async () => {
        showMessage('');

        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: 'https://auth.tenforge.dev/callback.html',
          },
        });

        if (error) {
          showMessage('Google ログインを開始できませんでした。時間をおいて再度お試しください。', 'error');
        }
      });
    </script>
  </body>
</html>
