<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
</head>
<body>
  <script>
    function getCookie(name) {
      const matches = document.cookie.match(`(^|;)\\s*${name}\\s*=\\s*([^;]+)`);
      return matches ? decodeURIComponent(matches[2]) : null;
    }
    const authToken = getCookie("tenforge-auth-token");
    if (!authToken) {
      const returnTo = encodeURIComponent(window.location.href);
      window.location.href = `https://auth.tenforge.dev/index.html?returnTo=${returnTo}`;
    }
  </script>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 3 6.5l9 4.5 9-4.5L12 2Z"></path>
            <path d="M3 12.5 12 17l9-4.5"></path>
            <path d="M3 17.5 12 22l9-4.5"></path>
          </svg>
        </div>
        <div>
          <div class="brand-title">家計簿</div>
          <button class="month-button" id="month-label" type="button">読込中...</button>
          <input type="month" id="month" class="month-input" aria-label="月選択">
        </div>
      </div>

      <nav class="nav" aria-label="メインナビゲーション">
        <button class="nav-item active" type="button" data-tab="home">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10.5Z"></path></svg>
          <span>ホーム</span>
        </button>
        <button class="nav-item" type="button" data-tab="records">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path><path d="M9 5a3 3 0 0 1 6 0v1H9V5Z"></path></svg>
          <span>記録</span>
        </button>
        <button class="nav-item" type="button" data-tab="budget">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"></path><path d="M10 20V4"></path><path d="M16 20v-7"></path><path d="M22 20H2"></path></svg>
          <span>予算</span>
        </button>
        <button class="nav-item" type="button" data-tab="reports">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"></path><path d="M4 19h16"></path><path d="m7 15 4-4 3 3 5-7"></path></svg>
          <span>レポート</span>
        </button>
        <button class="nav-item" type="button" data-tab="settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.05.05a2 2 0 1 1-2.83 2.83l-.05-.05A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.05a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.88.34l-.05.05a2 2 0 1 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.05a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.88l-.05-.05a2 2 0 1 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.05a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.88-.34l.05-.05a2 2 0 1 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.4 9c.36.6.95 1 1.55 1H21a2 2 0 1 1 0 4h-.05c-.6 0-1.19.4-1.55 1Z"></path></svg>
          <span>設定</span>
        </button>
      </nav>

      <div class="sidebar-user">
        <div class="avatar">家</div>
        <div>
          <div class="user-name">ユーザー</div>
          <div class="user-sub">個人</div>
        </div>
      </div>
    </aside>

    <main class="main">
      <section id="tab-home" class="tab-panel active">
        <div class="page-header">
          <div>
            <div class="page-month" id="page-month">読込中...</div>
            <h1>ダッシュボード</h1>
          </div>
          <button class="btn btn-primary" id="open-add-form" type="button">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>
            収支を追加
          </button>
        </div>

        <section class="add-card" id="add-card" hidden>
          <h2>新しい記録を追加</h2>
          <form id="record-form">
            <div class="type-toggle">
              <button class="type-btn active" type="button" data-type="expense">支出</button>
              <button class="type-btn" type="button" data-type="income">収入</button>
            </div>
            <input type="hidden" name="type" value="expense">
            <div class="form-grid">
              <label class="field"><span>日付</span><input type="date" id="date-input" name="date" required></label>
              <label class="field"><span>カテゴリ</span><input type="text" name="category" list="category-list" placeholder="食費" required></label>
              <label class="field"><span>金額</span><input type="number" name="amount" min="1" placeholder="3200" required></label>
              <label class="field"><span>メモ</span><input type="text" name="note" placeholder="スーパー"></label>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" type="submit">追加する</button>
              <button class="btn btn-secondary" id="cancel-add-form" type="button">キャンセル</button>
            </div>
          </form>
        </section>

        <section class="summary-grid">
          <article class="summary-card income-card">
            <span>今月の収入</span>
            <strong id="income-total">¥0</strong>
            <small id="income-delta"></small>
          </article>
          <article class="summary-card expense-card">
            <span>今月の支出</span>
            <strong id="expense-total">¥0</strong>
            <small id="expense-delta"></small>
          </article>
          <article class="summary-card balance-card">
            <span>今月の収支</span>
            <strong id="balance-total">¥0</strong>
            <small id="balance-delta"></small>
          </article>
        </section>

        <section class="charts-grid">
          <article class="card chart-card">
            <div class="card-header">
              <h2>月次推移</h2>
              <div class="legend"><span><i class="legend-income"></i>収入</span><span><i class="legend-expense"></i>支出</span></div>
            </div>
            <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
            <p class="empty-msg" id="trend-empty" hidden>データがありません</p>
          </article>
          <article class="card chart-card">
            <div class="card-header"><h2>カテゴリ別支出</h2></div>
            <div class="chart-wrap doughnut-wrap"><canvas id="category-chart"></canvas></div>
            <p class="empty-msg" id="category-empty" hidden>支出データがありません</p>
          </article>
        </section>

        <section class="card records-section">
          <div class="card-header">
            <h2>最近の記録</h2>
            <div class="table-tools">
              <label class="search-box">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                <input type="search" id="home-search-input" placeholder="検索...">
              </label>
              <a class="btn btn-secondary" id="export-csv" href="#">CSV</a>
            </div>
          </div>
          <div id="records-container" class="records-table"></div>
        </section>
      </section>

      <section id="tab-records" class="tab-panel">
        <div class="page-header">
          <div>
            <div class="page-month" id="records-page-month">読込中...</div>
            <h1>記録</h1>
          </div>
        </div>
        <section class="card records-section">
          <div class="card-header">
            <h2>全記録</h2>
            <div class="table-tools">
              <label class="search-box">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                <input type="search" id="records-search-input" placeholder="検索...">
              </label>
            </div>
          </div>
          <div id="all-records-container" class="records-table"></div>
        </section>
      </section>

      <section id="tab-budget" class="tab-panel">
        <div class="page-header"><div><div class="page-month">Budget</div><h1>予算</h1></div></div>
        <section class="card">
          <div class="card-header">
            <h2>予算進捗</h2>
            <button class="btn btn-secondary" id="open-budget-modal" type="button">編集</button>
          </div>
          <div id="budget-list" class="budget-list"></div>
        </section>
      </section>

      <section id="tab-reports" class="tab-panel">
        <div class="placeholder"><div>準備中</div><p>レポート画面は準備中です。</p></div>
      </section>

      <section id="tab-settings" class="tab-panel">
        <div class="page-header"><div><div class="page-month">Settings</div><h1>設定</h1></div></div>
        <section class="card settings-card">
          <div class="settings-row">
            <div><strong>テーマ</strong><span>ライト / ダークを切り替えます</span></div>
            <button class="btn btn-secondary" id="theme-toggle" type="button">切替</button>
          </div>
          <div class="settings-row">
            <div><strong>CSVエクスポート</strong><span>選択中の月の記録を書き出します</span></div>
            <a class="btn btn-secondary" id="export-csv-settings" href="#">CSV</a>
          </div>
        </section>
      </section>
    </main>
  </div>

  <datalist id="category-list">
    <option value="食費"><option value="交通費"><option value="住居費"><option value="光熱費">
    <option value="医療費"><option value="娯楽費"><option value="衣服費"><option value="日用品">
    <option value="給与"><option value="副収入"><option value="その他">
  </datalist>

  <dialog id="edit-modal" class="modal">
    <form id="edit-form">
      <h2 class="modal-title">記録を編集</h2>
      <input type="hidden" name="index">
      <div class="form-grid">
        <label class="field"><span>日付</span><input type="date" name="date" required></label>
        <label class="field"><span>種別</span><select name="type"><option value="expense">支出</option><option value="income">収入</option></select></label>
        <label class="field"><span>カテゴリ</span><input type="text" name="category" list="category-list" required></label>
        <label class="field"><span>金額</span><input type="number" name="amount" min="1" required></label>
        <label class="field form-wide"><span>メモ</span><input type="text" name="note"></label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="edit-cancel" type="button">キャンセル</button>
        <button class="btn btn-primary" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="budget-modal" class="modal">
    <form id="budget-form">
      <h2 class="modal-title">予算設定</h2>
      <p class="modal-note">カテゴリと月予算を入力してください</p>
      <div id="budget-fields" class="budget-fields"></div>
      <button class="btn btn-secondary btn-add-row" id="add-budget-row" type="button">カテゴリを追加</button>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="budget-cancel" type="button">キャンセル</button>
        <button class="btn btn-primary" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
